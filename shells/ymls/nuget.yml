# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Nuget

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest
    environment: production
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: NuGet login
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}

    - name: Build
      run: |
        dotnet build ./src/linker.libs -c release
        dotnet build ./src/linker.messenger -c release
        dotnet build ./src/linker.messenger.access -c release
        dotnet build ./src/linker.messenger.action -c release
        dotnet build ./src/linker.messenger.api -c release
        dotnet build ./src/linker.messenger.channel -c release
        dotnet build ./src/linker.messenger.decenter -c release
        dotnet build ./src/linker.messenger.entry -c release
        dotnet build ./src/linker.messenger.rpolicy -c release
        dotnet build ./src/linker.messenger.flow -c release
        dotnet build ./src/linker.messenger.forward -c release
        dotnet build ./src/linker.messenger.listen -c release
        dotnet build ./src/linker.messenger.logger -c release
        dotnet build ./src/linker.messenger.node -c release
        dotnet build ./src/linker.messenger.mesh -c release
        dotnet build ./src/linker.messenger.plan -c release
        dotnet build ./src/linker.messenger.relay -c release
        dotnet build ./src/linker.messenger.serializer.memorypack -c release
        dotnet build ./src/linker.messenger.reverse -c release
        dotnet build ./src/linker.messenger.signin -c release
        dotnet build ./src/linker.messenger.socks5 -c release
        dotnet build ./src/linker.messenger.store.file -c release
        dotnet build ./src/linker.messenger.sync -c release
        dotnet build ./src/linker.messenger.tunnel -c release
        dotnet build ./src/linker.messenger.tuntap -c release
        dotnet build ./src/linker.messenger.updater -c release
        dotnet build ./src/linker.messenger.firewall -c release
        dotnet build ./src/linker.messenger.wakeup -c release
        dotnet build ./src/linker.tun -c release
        dotnet build ./src/linker.nat -c release
        dotnet build ./src/linker.tunnel -c release
        dotnet build ./src/linker.upnp -c release
        dotnet build ./src/linker.fec -c release
        dotnet build ./src/linker.kcp -c release
        dotnet build ./src/linker.forward -c release
        dotnet build ./src/linker.stun -c release

    - name: Pack
      run: |
        dotnet pack ./src/linker.libs -c release
        dotnet pack ./src/linker.messenger -c release
        dotnet pack ./src/linker.messenger.access -c release
        dotnet pack ./src/linker.messenger.action -c release
        dotnet pack ./src/linker.messenger.api -c release
        dotnet pack ./src/linker.messenger.channel -c release
        dotnet pack ./src/linker.messenger.decenter -c release
        dotnet pack ./src/linker.messenger.entry -c release
        dotnet pack ./src/linker.messenger.rpolicy -c release
        dotnet pack ./src/linker.messenger.flow -c release
        dotnet pack ./src/linker.messenger.forward -c release
        dotnet pack ./src/linker.messenger.listen -c release
        dotnet pack ./src/linker.messenger.logger -c release
        dotnet pack ./src/linker.messenger.node -c release
        dotnet pack ./src/linker.messenger.mesh -c release
        dotnet pack ./src/linker.messenger.plan -c release
        dotnet pack ./src/linker.messenger.relay -c release
        dotnet pack ./src/linker.messenger.serializer.memorypack -c release
        dotnet pack ./src/linker.messenger.reverse -c release
        dotnet pack ./src/linker.messenger.signin -c release
        dotnet pack ./src/linker.messenger.socks5 -c release
        dotnet pack ./src/linker.messenger.store.file -c release
        dotnet pack ./src/linker.messenger.sync -c release
        dotnet pack ./src/linker.messenger.tunnel -c release
        dotnet pack ./src/linker.messenger.tuntap -c release
        dotnet pack ./src/linker.messenger.updater -c release
        dotnet pack ./src/linker.messenger.firewall -c release
        dotnet pack ./src/linker.messenger.wakeup -c release
        dotnet pack ./src/linker.messenger.wlist -c release
        dotnet pack ./src/linker.tun -c release
        dotnet pack ./src/linker.nat -c release
        dotnet pack ./src/linker.tunnel -c release
        dotnet pack ./src/linker.upnp -c release
        dotnet pack ./src/linker.fec -c release
        dotnet pack ./src/linker.kcp -c release
        dotnet pack ./src/linker.forward -c release
        dotnet pack ./src/linker.stun -c release
        
    - name: Push
      run: |
        dotnet nuget push ./src/linker.libs/bin/release/linker.libs.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
        dotnet nuget push ./src/linker.messenger/bin/release/linker.messenger.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
        dotnet nuget push ./src/linker.messenger.access/bin/release/linker.messenger.access.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
        dotnet nuget push ./src/linker.messenger.action/bin/release/linker.messenger.action.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
        dotnet nuget push ./src/linker.messenger.api/bin/release/linker.messenger.api.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
        dotnet nuget push ./src/linker.messenger.channel/bin/release/linker.messenger.channel.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
        dotnet nuget push ./src/linker.messenger.decenter/bin/release/linker.messenger.decenter.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
        dotnet nuget push ./src/linker.messenger.entry/bin/release/linker.messenger.entry.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
        dotnet nuget push ./src/linker.messenger.rpolicy/bin/release/linker.messenger.rpolicy.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
        dotnet nuget push ./src/linker.messenger.flow/bin/release/linker.messenger.flow.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
        dotnet nuget push ./src/linker.messenger.forward/bin/release/linker.messenger.forward.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
        dotnet nuget push ./src/linker.messenger.listen/bin/release/linker.messenger.listen.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
        dotnet nuget push ./src/linker.messenger.logger/bin/release/linker.messenger.logger.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
        dotnet nuget push ./src/linker.messenger.node/bin/release/linker.messenger.node.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
        dotnet nuget push ./src/linker.messenger.mesh/bin/release/linker.messenger.mesh.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
        dotnet nuget push ./src/linker.messenger.plan/bin/release/linker.messenger.plan.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
        dotnet nuget push ./src/linker.messenger.relay/bin/release/linker.messenger.relay.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
        dotnet nuget push ./src/linker.messenger.serializer.memorypack/bin/release/linker.messenger.serializer.memorypack.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
        dotnet nuget push ./src/linker.messenger.reverse/bin/release/linker.messenger.reverse.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
        dotnet nuget push ./src/linker.messenger.signin/bin/release/linker.messenger.signin.{{version}}.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{steps.login.outputs.NUGET_API_KEY}} --no-symbols
