          target-path: /downloads/linker/v2.0.00/linker-fnos-bin-x64.fpk
      - name: upload-bin-fpk-x64
        id: upload-bin-fpk-x64
        uses: actions/upload-release-asset@master
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
        with:
