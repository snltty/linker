name: LoongArch
'on':
  workflow_dispatch: null
jobs:
  build-loongarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup install
        run: sudo apt-get install binutils tar gzip

      - name: setup node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'

      - name: setup qemu
        uses: docker/setup-qemu-action@v3

      - name: build web
        run: |
          rm -rf global.json && \
          cd src/linker.web && \
          npm install && \
          npm run build && \
          cd ../../

      - name: Probe Loongnix .NET image
        run: |
          docker run --rm cr.loongnix.cn/extra/dotnet:8.0.7 \
          bash -lc 'uname -m && dotnet --info && dotnet --list-runtimes'
        
      - name: build linker with loongnix docker
        run: |
          docker run --rm --platform linux/loong64 \
          -e DOTNET_CLI_HOME=/tmp/dotnet-home \
          -e DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1 \
          -e DOTNET_CLI_TELEMETRY_OPTOUT=1 \
          -e DOTNET_NOLOGO=1 \
          -e XDG_DATA_HOME=/tmp/dotnet-xdg \
          -e NUGET_PACKAGES=/tmp/nuget/packages \
          -v "${{ github.workspace }}:/src" \
          -w /src \
          cr.loongnix.cn/extra/dotnet:8.0.7 \
          bash -lc '
            set -e

            mkdir -p "$XDG_DATA_HOME/NuGet/Migrations"
            touch "$XDG_DATA_HOME/NuGet/Migrations/1"

            dotnet --info

            SDK=/root/dotnet/sdk/8.0.107
            PROJECT=src/linker/linker.csproj

            dotnet "$SDK/MSBuild.dll" "$PROJECT" \
              /restore \
              /t:Publish \
              /m:1 \
              /nodeReuse:false \
              /p:Configuration=Release \
              /p:TargetFramework=net8.0 \
              /p:RuntimeIdentifier=linux-loongarch64 \
              /p:SelfContained=true \
              /p:PublishDir=/src/public/publish/loongarch64/ \
              /p:PublishSingleFile=true \
              /p:TrimMode=partial \
              /p:TieredPGO=true \
              /p:DebugType=full \
              /p:EventSourceSupport=false \
              /p:DebugSymbols=true \
              /p:EnableCompressionInSingleFile=true \
              /p:DebuggerSupport=false \
              /p:EnableUnsafeBinaryFormatterSerialization=false \
              /p:EnableUnsafeUTF7Encoding=false \
              /p:HttpActivityPropagationSupport=false \
              /p:InvariantGlobalization=true \
              /p:MetadataUpdaterSupport=false \
              /p:UseSystemResourceKeys=true \
              /p:MetricsSupport=false \
              /p:StackTraceSupport=false \
              /p:XmlResolverIsNetworkingEnabledByDefault=false \
              /p:UseSharedCompilation=false

            ls -lah /src/public/publish/loongarch64
          '    
            
      - name: zip package
        run: |
          cp -rf public/extends/any/web public/publish/loongarch64/web
          mkdir -p public/publish/loongarch64/configs
          mkdir -p public/publish/loongarch64/logs
          zip -r linker-loongarch64.zip public/publish/loongarch64

      - name: get latest release
        id: get_release
        run: |
          response=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.ACTIONS_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest")
          upload_url=$(echo "$response" | jq -r '.upload_url')
          echo "upload_url=$upload_url" >> $GITHUB_OUTPUT

      - name: upload
        id: upload
        uses: 'actions/upload-release-asset@master'
        env: {
          'GITHUB_TOKEN': '${{ secrets.ACTIONS_TOKEN }}'
        }
        with: {
          'upload_url': '${{ steps.get_release.outputs.upload_url }}',
          'asset_path': 'linker-loongarch64.zip',
          'asset_name': 'linker-loongarch64.zip',
        }